<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My One-Page Website</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>My One-Page Website</h1>

        <nav>
            <a href="#home">Home</a>
            <a href="#about">About</a>
            <a href="#gallery">Gallery</a>
            <a href="#contact">Contact</a>
        </nav>
    </header>

    <section id="home" class="hero">
        <h2>Welcome</h2>
        <p>This is my one-page website assignment.</p>
    </section>

    <section id="about">
        <h2>About</h2>

        <p>
            This website was created using HTML, CSS and JavaScript.
            It also contains an image gallery with a lightbox.
        </p>
    </section>

    <section id="gallery">

        <h2>Gallery</h2>

        <div class="gallery">

            <img src="https://picsum.photos/id/1015/300/200" alt="Nature">

            <img src="https://picsum.photos/id/1016/300/200" alt="Mountain">

            <img src="https://picsum.photos/id/1025/300/200" alt="Dog">

            <img src="https://picsum.photos/id/1035/300/200" alt="River">

        </div>

    </section>

    <section id="contact">

        <h2>Contact</h2>

        <p>Email: example@email.com</p>

    </section>

    <div id="lightbox">

        <span id="close">&times;</span>

        <img id="lightbox-img">

    </div>

<script src="script.js"></script>

</body>
</html>
